micronaut:
  test:
    resources:
      enabled: true
  security:
    # Ignore keycloak for the tests.
    # Use @Property(name="micronaut.security.enabled", value = "true")
    # to override
    enabled: false
  serde:
    jackson:
      pretty-print: true # Pretty print JSON for tests
# Micronaut Test Resources will see 'db-type' and start a Postgres container.
datasources:
  default:
    db-type: postgresql
    # Tell hibernate not to manage the schema, as Flyway does it.
    schema-generate: NONE

r2dbc:
  datasources:
    default:
      db-type: postgresql
      dialect: POSTGRES
      schema-generate: NONE

flyway:
  enabled: true
  datasources:
    default:
      enabled: true
      locations:
        - "classpath:db/migration"
        - classpath:db/taskscheduler-core # This creates the duty_cycle_task table

test-resources:
  containers:
    hashicorp-vault:
      image-name: "hashicorp/vault:1.21.2"
      command: ["server", "-dev", "-dev-kv-v1"]

vault:
  insecure: false
  hashicorp:
    url: "${vault.client.uri}"
    token: "${vault.client.token}"
    secret-engine-path: /v1/secret/
    authtype: userpass
    username: username
    password: password

endpoints:
  health:
    details-visible: ANONYMOUS # This is ONLY true in test, details about vault are NOT visible in prod for an unauthenticated user


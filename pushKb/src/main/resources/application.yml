micronaut:
  server:
    port: 8080
  application:
    name: pushKb
    #jvm: ## These seem to do nothing
    #  options:
    #    -Xms512m
    #    -Xmx2g
  http:
    client:
      #event-loop-group: other
      #read-timeout: 30
      max-content-length: 2147483647 # This strikes me as a bit dangerous, but 10MB causes issues from GOKB for some reason
  router:
    static-resources:
      swagger:
        enabled: true
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        enabled: true
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
  security:
    enabled: true
    intercept-url-map:
      - pattern: /swagger/**
        access: isAnonymous()
      - pattern: /swagger-ui/**
        access: isAnonymous()

    oauth2:
      enabled: true
      clients:
        keycloak:
          client-secret: '${OAUTH_CLIENT_SECRET:secret}'
          client-id: '${OAUTH_CLIENT_ID:pushKB}'
          openid:
            issuer: '${OIDC_ISSUER_DOMAIN:`http://localhost:8088`}/realms/${KEYCLOAK_REALM:PushKB}'
    token:
      jwt:
        enabled: true
        signatures:
          # Let Micronaut Security use the OIDC discovery mechanism.
          # By defining the issuer under oauth2.clients.keycloak.openid.issuer,
          # Micronaut security should automatically configure JWT signature validation
          # using the JWKS endpoint discovered from that issuer.
          # We remove the explicit 'jwks.keycloak' block to avoid a duplication conflict.
          enabled: true
  data:
    pageable:
      max-page-size: 1000
  endpoints:
    logouts:
      get-allowed: true
flyway:
  enabled: true
  datasources:
    default:
      enabled: true
      out-of-order: true # NECESSARY for our Flyway pattern
      locations:
        - classpath:db/migration
        - classpath:db/taskscheduler-core
      # default-schema: r2dbc-poc
      # url: ${DB_URL:`r2dbc:postgresql://localhost:5432/postgres`}
      # username: ${DB_USER:`postgres`}
      # password: ${DB_PASSWORD:`pass`}
db:
  host: localhost
  port: 5432


datasources:
  default:
    enabled: true
    dialect: POSTGRES
    driverClassName: org.postgresql.Driver
    schema-generate: NONE
    db-type: postgresql
    minimumIdle: 0
    maximumPoolSize: 12
    reconnect: true
    username: ${db.username}
    password: ${db.password}
    url: "jdbc:postgresql://${db.host}:${db.port}/${db.database}"

r2dbc:
  datasources:
    default:
      enabled: true
      dialect: POSTGRES
      # https://micronaut-projects.github.io/micronaut-test-resources/latest/guide/
      # Specify db-type so test resources knows what to provision
      # db-type: postgresql
      db-type: postgres
      reconnect: true
      url: "r2dbc:postgresql://${db.host}:${db.port}/${db.database}"
      username: ${db.username}
      password: ${db.password}
      # username: ${DB_USER:`postgres`}
      # password: ${DB_PASSWORD:`pass`}
      options:
        driver: pool
        protocol: postgres
        poolName: r2dbc
        maxSize: 10
        initialSize: 10
        # maxLifeTime: PT120M
        # maxLifeTime: PT20M
        maxIdleTime: PT240S
        # maxAcquireTime: PT20S
        validationQuery: "SELECT 1"
        validationDepth: REMOTE

      # driver: postgresql
      #url: "r2dbc:postgresql://${db.host}:${db.port}/${db.database:}"
      #host: "${db.host:localhost}"
      #username: "${db.username:}"
      #password: "${db.password:}"
      schema-generate: NONE

endpoints:
  prometheus:
    sensitive: false
  health:
    enabled: true
    sensitive: false # non-secured endpoint
    details-visible: ANONYMOUS # show details for everyone
    ingest:
      enabled: true
  info:
    enabled: true
    sensitive: false

applicationdetails:
  accessibleurl: ${ACCESSIBLE_URL}

taskscheduler:
  reactive:
    concurrency: ${TASKSCHEDULER_REACTIVE_CONCURRENCY:`1`}
  synchronous:
    concurrency: ${TASKSCHEDULER_SYNCHRONOUS_CONCURRENCY:`1`}
  interval: ${TASKSCHEDULER_INTERVAL:`PT10S`}

vault:
  insecure: "${VAULT_INSECURE: `false`}"
  hashicorp:
    url: "${VAULT_HASHICORP_URL: }"
    secret-engine-path: "${VAULT_HASHICORP_SECRET_ENGINE_PATH: }"
    authtype: "${VAULT_HASHICORP_AUTHTYPE: }"
    username: "${VAULT_HASHICORP_USERNAME: }"
    password: "${VAULT_HASHICORP_PASSWORD: }"
    token: "${VAULT_HASHICORP_TOKEN: }"
    kubernetes:
        role: "${VAULT_HASHICORP_KUBERNETES_ROLE: }"
        mount-path: "${VAULT_HASHICORP_KUBERNETES_MOUNT_PATH: }"
        service-account-token-path: "${VAULT_HASHICORP_KUBERNETES_SERVICE_ACCOUNT_TOKEN_PATH: }"
